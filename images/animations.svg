<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- COTTON CANDY / SUGAR MACHINE -->
  <symbol id="anim-sugar" viewBox="0 0 80 80">
    <rect x="28" y="45" width="24" height="28" rx="3" fill="#e0e0e0" stroke="#bbb" stroke-width="1.5"/>
    <rect x="32" y="50" width="16" height="10" rx="2" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <circle cx="40" cy="55" r="3" fill="#f9a8d4" opacity=".6">
      <animate attributeName="r" values="3;4;3" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <line x1="40" y1="45" x2="40" y2="30" stroke="#999" stroke-width="2" stroke-linecap="round"/>
    <!-- Cotton candy cloud -->
    <g>
      <circle cx="34" cy="22" r="8" fill="#f9a8d4" opacity=".85">
        <animate attributeName="r" values="8;9;8" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="44" cy="20" r="9" fill="#fbcfe8" opacity=".8">
        <animate attributeName="r" values="9;10.5;9" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="38" cy="14" r="7" fill="#f472b6" opacity=".6">
        <animate attributeName="r" values="7;8.5;7" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="14;12;14" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="46" cy="28" r="5" fill="#fce7f3" opacity=".7">
        <animate attributeName="r" values="5;6;5" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- Spinning disc inside -->
    <circle cx="40" cy="55" r="6" fill="none" stroke="#f9a8d4" stroke-width="1" stroke-dasharray="3 3">
      <animateTransform attributeName="transform" type="rotate" from="0 40 55" to="360 40 55" dur="2s" repeatCount="indefinite"/>
    </circle>
  </symbol>

  <!-- POPCORN MACHINE -->
  <symbol id="anim-popcorn" viewBox="0 0 80 80">
    <!-- Machine body -->
    <rect x="22" y="35" width="36" height="35" rx="4" fill="#dc2626" stroke="#b91c1c" stroke-width="1.5"/>
    <rect x="26" y="38" width="28" height="20" rx="2" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
    <!-- Glass window -->
    <rect x="28" y="40" width="24" height="16" rx="1" fill="#fffbeb" opacity=".7"/>
    <!-- Popcorn kernels popping -->
    <circle cx="34" cy="50" r="3" fill="#fbbf24">
      <animate attributeName="cy" values="50;38;50" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="42" cy="48" r="2.5" fill="#fcd34d">
      <animate attributeName="cy" values="48;36;48" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="1;1;0.3" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="38" cy="52" r="2" fill="#fde68a">
      <animate attributeName="cy" values="52;40;52" dur="1.3s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="opacity" values="1;1;0.3" dur="1.3s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="46" cy="46" r="2.8" fill="#fbbf24">
      <animate attributeName="cy" values="46;34;46" dur="1.6s" repeatCount="indefinite" begin="0.9s"/>
      <animate attributeName="opacity" values="1;1;0.3" dur="1.6s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <!-- Top lid -->
    <rect x="20" y="32" width="40" height="5" rx="2" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
    <rect x="36" y="26" width="8" height="8" rx="4" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
    <!-- Legs -->
    <line x1="28" y1="70" x2="28" y2="76" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
    <line x1="52" y1="70" x2="52" y2="76" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
    <!-- Steam -->
    <path d="M35 28 Q33 22 36 18" fill="none" stroke="#e5e7eb" stroke-width="1.5" opacity=".5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M35 28 Q33 22 36 18;M35 28 Q37 22 34 16;M35 28 Q33 22 36 18" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M44 28 Q46 22 43 16" fill="none" stroke="#e5e7eb" stroke-width="1.5" opacity=".4" stroke-linecap="round">
      <animate attributeName="opacity" values="0.4;0.15;0.4" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M44 28 Q46 22 43 16;M44 28 Q42 22 45 14;M44 28 Q46 22 43 16" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </symbol>

  <!-- SLUSH / ICE MACHINE -->
  <symbol id="anim-slush" viewBox="0 0 80 80">
    <!-- Machine body -->
    <rect x="18" y="20" width="44" height="40" rx="5" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
    <!-- Two tanks -->
    <rect x="22" y="24" width="16" height="28" rx="3" fill="#38bdf8" opacity=".4"/>
    <rect x="42" y="24" width="16" height="28" rx="3" fill="#c084fc" opacity=".4"/>
    <!-- Swirling liquid left -->
    <circle cx="30" cy="38" r="5" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4 3">
      <animateTransform attributeName="transform" type="rotate" from="0 30 38" to="360 30 38" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Swirling liquid right -->
    <circle cx="50" cy="38" r="5" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 3">
      <animateTransform attributeName="transform" type="rotate" from="0 50 38" to="-360 50 38" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Dripping nozzles -->
    <rect x="28" y="60" width="4" height="6" rx="1" fill="#94a3b8"/>
    <rect x="48" y="60" width="4" height="6" rx="1" fill="#94a3b8"/>
    <!-- Drips -->
    <circle cx="30" cy="68" r="1.5" fill="#0ea5e9">
      <animate attributeName="cy" values="66;74;66" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="68" r="1.5" fill="#a855f7">
      <animate attributeName="cy" values="66;74;66" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <!-- Top -->
    <rect x="16" y="16" width="48" height="6" rx="3" fill="#bae6fd" stroke="#7dd3fc" stroke-width="1"/>
    <!-- Ice crystals -->
    <text x="26" y="34" font-size="6" fill="#fff" opacity=".7">*</text>
    <text x="46" y="34" font-size="6" fill="#fff" opacity=".7">*</text>
    <text x="32" y="46" font-size="5" fill="#fff" opacity=".5">
      <animate attributeName="opacity" values=".5;1;.5" dur="2s" repeatCount="indefinite"/>
    </text>
  </symbol>

  <!-- FACE PAINTING -->
  <symbol id="anim-facepaint" viewBox="0 0 80 80">
    <!-- Face circle -->
    <circle cx="40" cy="38" r="22" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
    <!-- Eyes -->
    <circle cx="33" cy="34" r="2.5" fill="#1e1b2e"/>
    <circle cx="47" cy="34" r="2.5" fill="#1e1b2e"/>
    <!-- Smile -->
    <path d="M32 44 Q40 52 48 44" fill="none" stroke="#1e1b2e" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Butterfly wing left -->
    <path d="M22 30 Q16 22 24 18 Q30 22 28 30" fill="#f472b6" opacity=".7">
      <animate attributeName="opacity" values=".7;.9;.7" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Butterfly wing right -->
    <path d="M58 30 Q64 22 56 18 Q50 22 52 30" fill="#a855f7" opacity=".7">
      <animate attributeName="opacity" values=".7;.9;.7" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </path>
    <!-- Stars on cheeks -->
    <polygon points="33,42 34,44 36,44 34.5,45.5 35,47.5 33,46 31,47.5 31.5,45.5 30,44 32,44" fill="#fbbf24" opacity=".8">
      <animate attributeName="opacity" values=".8;1;.8" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="47,42 48,44 50,44 48.5,45.5 49,47.5 47,46 45,47.5 45.5,45.5 44,44 46,44" fill="#38bdf8" opacity=".8">
      <animate attributeName="opacity" values=".8;1;.8" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </polygon>
    <!-- Paint brush -->
    <g>
      <line x1="58" y1="55" x2="68" y2="68" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="56" cy="53" rx="4" ry="2.5" fill="#f472b6" transform="rotate(-40 56 53)"/>
      <!-- Paint stroke being drawn -->
      <path d="M52 50 Q48 56 44 54" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" stroke-dasharray="20" stroke-dashoffset="20">
        <animate attributeName="stroke-dashoffset" values="20;0;20" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
  </symbol>

</svg>
